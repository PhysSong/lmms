language: cpp
compiler: gcc
dist: xenial
sudo: required
cache:
    directories:
        - $HOME/apt_mingw_cache
        - $HOME/.ccache
        - $HOME/pbuilder-bases
matrix:
    include:
        - env: QT5=True TARGET_OS=win32 TARGET_DEPLOY=True
          dist: trusty
        - env: QT5=True TARGET_OS=win64 TARGET_DEPLOY=True
          dist: trusty
        - env: QT5=True
        - os: osx
          osx_image: xcode9.4
          env: QT5=True
before_install:
   - . ${TRAVIS_BUILD_DIR}/.travis/${TRAVIS_OS_NAME}.${TARGET_OS}.before_install.sh
install:
    - . ${TRAVIS_BUILD_DIR}/.travis/${TRAVIS_OS_NAME}.${TARGET_OS}.install.sh
before_script:
    - export CMAKE_FLAGS="-DWANT_QT5=$QT5 -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUNDLE_QT_TRANSLATIONS=ON -DCONTRIBUTORS=${TRAVIS_BUILD_DIR}/doc/CONTRIBUTORS"
script:
    - . ${TRAVIS_BUILD_DIR}/.travis/${TRAVIS_OS_NAME}.${TARGET_OS}.script.sh
